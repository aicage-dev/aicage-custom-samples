name: Test Base Images
run-name: Test base images (${{ github.ref_name }})

"on":
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test-base-images:
    name: Base ${{ matrix.base }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base:
          - act
          - act-full
          - debian-mirror
          - minimal
          - php
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          chmod +x scripts/*.sh validation/lint.sh
          scripts/build-base.sh \
            --base "${{ matrix.base }}" \
            --image "aicage-custom-samples:test-base-${{ matrix.base }}"

      - name: Run base smoke tests
        run: |
          scripts/test-base.sh \
            --base "${{ matrix.base }}" \
            --image "aicage-custom-samples:test-base-${{ matrix.base }}"
