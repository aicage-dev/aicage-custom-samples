name: Test Base Images
run-name: Test base images (${{ github.ref_name }})

"on":
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-base-images:
    name: Base ${{ matrix.base }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base:
          - act
          - debian-mirror
          - minimal
          - php
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Build base image
        run: |
          scripts/build-base.sh \
            --base "${{ matrix.base }}" \
            --image "aicage-custom-samples:test-base-${{ matrix.base }}"

      - name: Run base smoke tests
        run: |
          scripts/test-base.sh \
            --base "${{ matrix.base }}" \
            --image "aicage-custom-samples:test-base-${{ matrix.base }}"
