name: Test Extensions
run-name: Test extensions (${{ github.ref_name }})

"on":
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  discover-extension-matrices:
    name: Discover extension matrices
    runs-on: ubuntu-latest
    env:
      DISTRO_IMAGES_JSON: >-
        {"alpine":"ghcr.io/aicage/aicage:codex-alpine","debian":"ghcr.io/aicage/aicage:codex-debian","fedora":"ghcr.io/aicage/aicage:codex-fedora"}
      EXCLUDED_AMD64_JSON: >-
        [["nvidia-cuda","alpine"]]
      EXCLUDED_ARM64_JSON: >-
        [["nvidia-cuda","alpine"],["nvidia-cuda","debian"],["nvidia-cuda","fedora"]]
    outputs:
      matrix_amd64: ${{ steps.generate.outputs.matrix_amd64 }}
      matrix_arm64: ${{ steps.generate.outputs.matrix_arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Generate matrices
        id: generate
        run: |
          matrix_amd64="$(scripts/generate-extension-matrix.py \
            '${{ env.DISTRO_IMAGES_JSON }}' \
            '${{ env.EXCLUDED_AMD64_JSON }}')"
          echo "matrix_amd64=${matrix_amd64}" >> "$GITHUB_OUTPUT"

          matrix_arm64="$(scripts/generate-extension-matrix.py \
            '${{ env.DISTRO_IMAGES_JSON }}' \
            '${{ env.EXCLUDED_ARM64_JSON }}')"
          echo "matrix_arm64=${matrix_arm64}" >> "$GITHUB_OUTPUT"

  test-extensions-amd64:
    needs: discover-extension-matrices
    name: "${{ matrix.extension }} on ${{ matrix.distro }} (amd64)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-extension-matrices.outputs.matrix_amd64) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # 4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build extension image
        run: |
          scripts/build-extension.sh \
            --extension "${{ matrix.extension }}" \
            --from-image "${{ matrix.from_image }}" \
            --image "aicage-custom-samples:test-extension-${{ matrix.extension }}"

      - name: Run extension smoke tests
        run: |
          scripts/test-extension.sh \
            --extension "${{ matrix.extension }}" \
            --image "aicage-custom-samples:test-extension-${{ matrix.extension }}"

  test-extensions-arm64:
    needs: discover-extension-matrices
    name: "${{ matrix.extension }} on ${{ matrix.distro }} (arm64)"
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-extension-matrices.outputs.matrix_arm64) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # 4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build extension image
        run: |
          scripts/build-extension.sh \
            --extension "${{ matrix.extension }}" \
            --from-image "${{ matrix.from_image }}" \
            --image "aicage-custom-samples:test-extension-${{ matrix.extension }}"

      - name: Run extension smoke tests
        run: |
          scripts/test-extension.sh \
            --extension "${{ matrix.extension }}" \
            --image "aicage-custom-samples:test-extension-${{ matrix.extension }}"
