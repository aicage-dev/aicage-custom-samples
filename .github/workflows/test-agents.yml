name: Test Agents
run-name: Test agents (${{ github.ref_name }})

"on":
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-agents:
    name: Agent ${{ matrix.agent }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - auggie
          - forge
          - kimi
          - vibe
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Build agent image
        run: |
          chmod +x scripts/*.sh agents/*/*.sh
          scripts/build-agent.sh \
            --agent "${{ matrix.agent }}" \
            --base-image "ghcr.io/aicage/aicage-image-base:ubuntu" \
            --image "aicage-custom-samples:test-agent-${{ matrix.agent }}"

      - name: Run agent smoke tests
        run: |
          scripts/test-agent.sh \
            --agent "${{ matrix.agent }}" \
            --image "aicage-custom-samples:test-agent-${{ matrix.agent }}"
