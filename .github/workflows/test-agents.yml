name: Test Agents
run-name: Test agents (${{ github.ref_name }})

"on":
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test-agents:
    name: Agent ${{ matrix.agent }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent:
          - auggie
          - forge
          - kimi
          - vibe
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43  # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Build agent image
        run: |
          chmod +x scripts/*.sh agents/*/*.sh
          scripts/build-agent.sh \
            --agent "${{ matrix.agent }}" \
            --base-image "ghcr.io/aicage/aicage-image-base:ubuntu" \
            --image "aicage-custom-samples:test-agent-${{ matrix.agent }}"

      - name: Run agent smoke tests
        run: |
          scripts/test-agent.sh \
            --agent "${{ matrix.agent }}" \
            --image "aicage-custom-samples:test-agent-${{ matrix.agent }}"
